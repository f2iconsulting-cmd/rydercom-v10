name: Build RyderCom V10 APK
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Generate launcher icons from logo
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null
          convert www/logo-hero.png -resize 192x192 -background black -gravity center -extent 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert www/logo-hero.png -resize 144x144 -background black -gravity center -extent 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert www/logo-hero.png -resize 96x96 -background black -gravity center -extent 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert www/logo-hero.png -resize 72x72 -background black -gravity center -extent 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert www/logo-hero.png -resize 48x48 -background black -gravity center -extent 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          find android/app/src/main/res -name "ic_launcher_foreground.xml" -delete
          find android/app/src/main/res -name "ic_launcher_background.xml" -delete
          find android/app/src/main/res/mipmap-anydpi-v26 -name "ic_launcher.xml" -delete
          find android/app/src/main/res/mipmap-anydpi-v26 -name "ic_launcher_round.xml" -delete
      - name: Decode and prepare fixed keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/rydercom-v10.keystore
          echo "=== EMPREINTE KEYSTORE FIXE ==="
          keytool -list -v -keystore android/app/rydercom-v10.keystore -storepass rydercom2024 -alias rydercomv10 2>/dev/null | grep -E "SHA1:|SHA256:"
          echo "=== FIN ==="
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build Debug APK with fixed keystore
        run: |
          cd android
          ./gradlew assembleDebug -Pandroid.injected.signing.store.file=${GITHUB_WORKSPACE}/android/app/rydercom-v10.keystore -Pandroid.injected.signing.store.password=rydercom2024 -Pandroid.injected.signing.key.alias=rydercomv10 -Pandroid.injected.signing.key.password=rydercom2024 --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
      - name: Upload Debug APK as Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: RyderCom v10 — Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
