<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyderCom Native PoC</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #1a1a1a; color: white; }
        h1 { color: #ff9800; font-size: 24px; margin-bottom: 5px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 10px; }
        .version { color: #555; font-size: 11px; margin-bottom: 20px; }
        button { width: 90%; padding: 25px; margin: 15px auto; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; display: block; cursor: pointer; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        #status { font-size: 18px; font-weight: bold; color: #2196F3; margin: 15px; padding: 10px; border: 1px solid #333; background: #222; border-radius: 8px; }
        #log { font-size: 11px; color: #888; margin: 10px; padding: 8px; border: 1px solid #333; background: #111; border-radius: 6px; text-align: left; min-height: 60px; max-height: 180px; overflow-y: auto; word-break: break-all; }
    </style>
    <script src="capacitor.js"></script>
</head>
<body>
    <h1>🏍️ RyderCom — Architecture Audio Native</h1>
    <p>Phase Laboratoire — Isolation et validation du micro en tâche de fond</p>
    <div class="version">v1.0.4-auto</div>

    <div id="status">Statut : DÉCONNECTÉ</div>
    <div id="log">[ Logs en attente... ]</div>

    <button class="start" onclick="connecterIntercom()">1. REJOINDRE L'INTERCOM</button>
    <button class="stop" onclick="deconnecterIntercom()">2. QUITTER L'INTERCOM</button>

    <script>
        const { RyderComNativeAudio } = Capacitor.Plugins;

        // On reprend tes vraies configurations officielles de production
        const WS_URL    = "wss://rydercom-4w764w6b.livekit.cloud";
        const ROOM_NAME  = "Meute-Labo-Routier";
        const IDENTITY   = "Moto-Test-Franck";

        function log(msg) {
            const d = new Date();
            const t = d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<br>['+t+'] ' + msg;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log('[LABO] ' + msg);
        }

        RyderComNativeAudio.addListener('connectionStateChange', (info) => {
            const statusDiv = document.getElementById('status');
            const state = info.state ? info.state.toUpperCase() : 'INCONNU';
            statusDiv.innerText = "Statut : " + state;
            log('État reçu : ' + state + (info.error ? ' | Erreur : ' + info.error : ''));
            if (state === 'CONNECTED')   statusDiv.style.color = '#4CAF50';
            if (state === 'CONNECTING' || state === 'RECONNECTING') statusDiv.style.color = '#ff9800';
            if (state === 'DISCONNECTED') statusDiv.style.color = '#f44336';
            if (state === 'ERROR')        statusDiv.style.color = '#ff0000';
        });

        async function connecterIntercom() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = "Récupération du token...";
            log('--- CONNEXION AUTOMATIQUE DÉMARRÉE ---');
            
            try {
                // On utilise ton serveur Puter officiel comme sur la version stable
                const response = await fetch(`https://rydercom.puter.site/token?room=${ROOM_NAME}&identity=${IDENTITY}`);
                if (!response.ok) throw new Error("Impossible de récupérer le token depuis Puter");
                
                const data = await response.json();
                log('Token récupéré avec succès via Puter ✅');

                statusDiv.innerText = "Appel plugin natif...";
                log('Appel joinNativeRoom → Envoi du token à Android');
                
                // On envoie le token reçu au moteur Java natif
                await RyderComNativeAudio.joinNativeRoom({
                    wsUrl: WS_URL,
                    token: data.token
                });
                
                log('joinNativeRoom appelé ✅');
            } catch (err) {
                statusDiv.style.color = '#ff0000';
                statusDiv.innerText = "Erreur : " + err.message;
                log('ERREUR : ' + err.message);
                alert("Erreur : " + err.message);
            }
        }

        function deconnecterIntercom() {
            log('--- DÉCONNEXION ---');
            RyderComNativeAudio.leaveNativeRoom()
                .then(() => log('leaveNativeRoom OK'))
                .catch(err => log('Erreur coupure : ' + err));
        }
    </script>
</body>
</html>
