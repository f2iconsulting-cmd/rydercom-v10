<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RyderCom Lab</title>
  <script src="capacitor.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #121212;
      color: #e0e0e0;
      font-family: monospace;
      padding: 15px;
    }
    h1 { text-align: center; font-size: 1.3rem; margin: 10px 0 15px 0; color: #ffffff; }
    #status {
      background: #1e1e1e;
      border: 2px solid #ff4444;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
      color: #ff4444;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    #status.connecting { border-color: #ffbb00; color: #ffbb00; }
    #status.connected { border-color: #00c851; color: #00c851; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 8px; font-family: monospace; font-size: 1rem; font-weight: bold; color: #ffffff; cursor: pointer; margin-bottom: 12px; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .btn-join {
      background: #00c851;
    }
    .btn-join:active { background: #007e33; }
    .btn-leave {
      background: #ff4444;
    }
    .btn-leave:active { background: #cc0000; }
    .btn-copy { background: #333333; border: 1px solid #555555; }
    .btn-copy:active { background: #222222; }
    #console { background: #000000; border: 1px solid #333333; border-radius: 6px; height: 220px; overflow-y: auto; padding: 10px; font-size: 0.85rem; color: #00ff00; white-space: pre-wrap; word-break: break-all; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🏍️ RyderCom — CONSOLE LAB</h1>
  <div id="status">DÉCONNECTÉ</div>
  <button class="btn btn-join" onclick="connecterIntercom()">REJOINDRE L'INTERCOM</button>
  <button class="btn btn-leave" onclick="quitterIntercom()">QUITTER L'INTERCOM</button>
  <button class="btn btn-copy" onclick="copierLogs()">📋 Copier les logs de la console</button>
  <div id="console"></div>
  <script>
    const { RyderComNativeAudio } = Capacitor.Plugins;
    const logHistory = [];
    const wsUrl = "wss://testwave-zq4b8zeh.livekit.cloud";
    const sessionName = "Intercom Motard — Canal Labo";
    const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODA0NTE1NDUsImlzcyI6IkFQSUVlNDVQbjY3dG9qWiIsInN1YiI6Ik1vdG8tVGVzdC1GcmFuY2siLCJ2aWRlbyI6e3Jvb21Kb2luIjp0cnVlLCJyb29tIjoiTWV1dGUtTGFiby1Sb3V0aWVyIn19.O_WFczVy42v6df-SHrAVxzwjF5vf_vSqFe2c25IXBFo";
    function ajouterLog(message) {
      const maintenant = new Date();
      const h = String(maintenant.getHours()).padStart(2, "0");
      const m = String(maintenant.getMinutes()).padStart(2, "0");
      const s = String(maintenant.getSeconds()).padStart(2, "0");
      const ts = `[${h}:${m}:${s}] `;
      const ligneComplete = ts + message;
      logHistory.push(ligneComplete);
      const consoleDiv = document.getElementById("console");
      consoleDiv.innerText += ligneComplete + "\n";
      consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }
    function copierLogs() {
      const texteACopier = logHistory.join("\n");
      navigator.clipboard.writeText(texteACopier)
        .then(() => {
          ajouterLog("Succès : Logs copiés dans le presse-papier.");
        })
        .catch((err) => {
          ajouterLog("Erreur lors de la copie des logs : " + err);
        });
    }
    async function connecterIntercom() {
      ajouterLog("Action : Clic sur REJOINDRE L'INTERCOM");
      try {
        const statusDiv = document.getElementById("status");
        statusDiv.className = "connecting";
        statusDiv.innerText = "EN COURS";
        ajouterLog(`Appel plugin : joinNativeRoom sur ${sessionName}`);
        await RyderComNativeAudio.joinNativeRoom({ wsUrl, token, sessionName });
        ajouterLog("Plugin exécuté avec succès.");
      } catch (err) {
        ajouterLog("Erreur lors de l'appel joinNativeRoom : " + err.message);
        const statusDiv = document.getElementById("status");
        statusDiv.className = "";
        statusDiv.innerText = "DÉCONNECTÉ";
      }
    }
    async function quitterIntercom() {
      ajouterLog("Action : Clic sur QUITTER L'INTERCOM");
      try {
        await RyderComNativeAudio.leaveNativeRoom();
        ajouterLog("Demande de déconnexion envoyée au plugin.");
      } catch (err) {
        ajouterLog("Erreur lors de l'appel leaveNativeRoom : " + err.message);
      }
    }
    try {
      ajouterLog("Initialisation de l'écouteur d'état LiveKit natif...");
      RyderComNativeAudio.addListener("connectionStateChange", (info) => {
        const statusDiv = document.getElementById("status");
        ajouterLog("Événement natif connectionStateChange reçu : " + info.state);
        if (info.state === "CONNECTED") {
          statusDiv.className = "connected";
          statusDiv.innerText = "CONNECTÉ";
        } else if (info.state === "CONNECTING" || info.state === "RECONNECTING") {
          statusDiv.className = "connecting";
          statusDiv.innerText = "EN COURS";
        } else {
          statusDiv.className = "";
          statusDiv.innerText = "DÉCONNECTÉ";
        }
      });
      ajouterLog("Écouteur configuré avec succès.");
    } catch (e) {
      ajouterLog("Erreur lors de l'initialisation de l'écouteur : " + e.message);
    }
  </script>
</body>
</html>
