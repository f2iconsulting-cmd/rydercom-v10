<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>rydercom-native-poc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111318;
      --border:    #1e2228;
      --accent:    #00e5a0;
      --accent2:   #0af;
      --warn:      #f5a623;
      --error:     #ff4d4d;
      --text:      #c8d0dc;
      --muted:     #4a5568;
      --header-h:  56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .app-name {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .rev-badge {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* STATUS PILL */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .status-dot.connecting {
      background: var(--warn);
      box-shadow: 0 0 6px var(--warn);
      animation: blink 0.8s ease-in-out infinite alternate;
    }
    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 6px var(--error);
    }

    @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

    .status-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.3s;
      text-transform: uppercase;
    }
    .status-label.connected { color: var(--accent); }
    .status-label.connecting { color: var(--warn); }
    .status-label.error      { color: var(--error); }

    /* ── MAIN LAYOUT ── */
    main {
      position: fixed;
      top: var(--header-h);
      bottom: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 13px 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none;
    }

    .btn-connect {
      background: var(--accent);
      color: #000;
    }
    .btn-connect:not(:disabled):hover {
      box-shadow: 0 0 16px rgba(0,229,160,0.4);
    }

    .btn-disconnect {
      background: transparent;
      color: var(--error);
      border: 1px solid var(--error);
    }
    .btn-disconnect:not(:disabled):hover {
      background: rgba(255,77,77,0.08);
      box-shadow: 0 0 16px rgba(255,77,77,0.2);
    }

    /* ── LOG PANEL ── */
    .log-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: #0d1117;
      flex-shrink: 0;
    }

    .log-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .log-count {
      font-size: 10px;
      color: var(--muted);
    }

    .btn-copy {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-copy:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(0,170,255,0.05);
    }

    .btn-copy.copied {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,229,160,0.06);
    }

    .btn-copy svg { width: 11px; height: 11px; }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      display: grid;
      grid-template-columns: 62px 42px 1fr;
      gap: 8px;
      align-items: baseline;
      line-height: 1.6;
      font-size: 11.5px;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: none; }
    }

    .log-time { color: var(--muted); font-size: 10.5px; }

    .log-level {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      padding: 1px 4px;
      border-radius: 3px;
    }

    .level-info  { color: var(--accent2); background: rgba(0,170,255,0.08); }
    .level-warn  { color: var(--warn);    background: rgba(245,166,35,0.1); }
    .level-error { color: var(--error);   background: rgba(255,77,77,0.1); }
    .level-sys   { color: var(--muted);   background: rgba(74,85,104,0.15); }

    .log-msg { color: var(--text); word-break: break-all; }
    .log-msg.sys { color: var(--muted); font-style: italic; }

    .log-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <span class="app-name">rydercom-native-poc</span>
      <span class="rev-badge">Rev. 0.1.0</span>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">DISCONNECTED</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- BUTTONS -->
    <div class="btn-row">
      <button class="btn btn-connect" id="btnConnect" onclick="onConnect()">
        ▶ Connect
      </button>
      <button class="btn btn-disconnect" id="btnDisconnect" disabled onclick="onDisconnect()">
        ■ Disconnect
      </button>
    </div>

    <!-- LOG PANEL -->
    <div class="log-panel">
      <div class="log-header">
        <span class="log-title">// event log</span>
        <span class="log-count" id="logCount">0 events</span>
        <button class="btn-copy" id="btnCopy" onclick="copyLog()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          COPY LOG
        </button>
      </div>
      <div class="log-body" id="logBody">
        <div class="log-empty" id="logEmpty">— en attente d'événements —</div>
      </div>
    </div>

  </main>

  <script>
    // ── STATE ──
    const State = {
      DISCONNECTED: 'DISCONNECTED',
      CONNECTING:   'CONNECTING',
      CONNECTED:    'CONNECTED',
      ERROR:        'ERROR'
    };

    let currentState = State.DISCONNECTED;
    let logEntries   = [];

    // ── LOG ENGINE ──
    function now() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    function log(msg, level = 'INFO') {
      const entry = { time: now(), level, msg };
      logEntries.push(entry);

      const body  = document.getElementById('logBody');
      const empty = document.getElementById('logEmpty');
      const count = document.getElementById('logCount');

      if (empty) empty.remove();

      const levelClass = {
        INFO:  'level-info',
        WARN:  'level-warn',
        ERROR: 'level-error',
        SYS:   'level-sys'
      }[level] || 'level-info';

      const msgClass = level === 'SYS' ? 'log-msg sys' : 'log-msg';

      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `
        <span class="log-time">${entry.time}</span>
        <span class="log-level ${levelClass}">${level}</span>
        <span class="${msgClass}">${escapeHtml(msg)}</span>
      `;

      body.appendChild(el);
      body.scrollTop = body.scrollHeight;

      const n = logEntries.length;
      count.textContent = `${n} event${n > 1 ? 's' : ''}`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── STATUS ──
    function setStatus(state) {
      currentState = state;
      const dot   = document.getElementById('statusDot');
      const label = document.getElementById('statusLabel');
      const cls   = state.toLowerCase();

      dot.className   = `status-dot ${cls === 'disconnected' ? '' : cls}`;
      label.className = `status-label ${cls === 'disconnected' ? '' : cls}`;
      label.textContent = state;
    }

    // ── BUTTON STATES ──
    function setBtns(connectEnabled, disconnectEnabled) {
      document.getElementById('btnConnect').disabled    = !connectEnabled;
      document.getElementById('btnDisconnect').disabled = !disconnectEnabled;
    }

    // ── HANDLERS ──
    function onConnect() {
      log('Connect requested by user', 'INFO');
      setStatus(State.CONNECTING);
      setBtns(false, false);
      // Placeholder — LiveKit integration à venir (étape 2)
      log('En attente d\'intégration LiveKit SDK…', 'SYS');
    }

    function onDisconnect() {
      log('Disconnect requested by user', 'INFO');
      // Placeholder — LiveKit integration à venir (étape 2)
      setStatus(State.DISCONNECTED);
      setBtns(true, false);
      log('Session terminée (stub)', 'SYS');
    }

    // ── COPY LOG ──
    function copyLog() {
      if (!logEntries.length) return;

      const text = logEntries
        .map(e => `[${e.time}] [${e.level}] ${e.msg}`)
        .join('\n');

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          COPIED
        `;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            COPY LOG
          `;
        }, 2000);
      }).catch(() => {
        log('Clipboard non disponible (contexte non-HTTPS ?)', 'WARN');
      });
    }

    // ── INIT ──
    (function init() {
      log('App initialisée — Rev. 0.1.0', 'SYS');
      log('En attente d\'action utilisateur', 'SYS');
      setBtns(true, false);
    })();
  </script>
</body>
</html>
