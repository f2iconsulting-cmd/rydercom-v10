<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyderCom Native PoC</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #1a1a1a; color: white; }
        h1 { color: #ff9800; font-size: 24px; margin-bottom: 5px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 30px; }
        button { width: 90%; padding: 25px; margin: 15px auto; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; display: block; cursor: pointer; }
        .start { background: #4CAF50; color: white; }
        .stop { background: #f44336; color: white; }
        #status { font-size: 20px; font-weight: bold; color: #2196F3; margin: 25px; padding: 10px; border: 1px solid #333; background: #222; border-radius: 8px; }
    </style>
    <script src="capacitor.js"></script>
</head>
<body>

    <h1>🏍️ RyderCom — Architecture Audio Native</h1>
    <p>Phase Laboratoire : Isolation et validation du micro en tâche de fond</p>

    <div id="status">Statut : DÉCONNECTÉ</div>

    <button class="start" onclick="connecterIntercom()">1. REJOINDRE L'INTERCOM</button>
    <button class="stop" onclick="deconnecterIntercom()">2. QUITTER L'INTERCOM</button>

    <script>
        const { RyderComNativeAudio } = Capacitor.Plugins;

        // Écouteur universel d'état (Compatible Android / iOS pour le futur)
        RyderComNativeAudio.addListener('connectionStateChange', (info) => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Statut : " + info.state.toUpperCase();
            
            if (info.state === 'connected') statusDiv.style.color = '#4CAF50';
            if (info.state === 'connecting' || info.state === 'reconnecting') statusDiv.style.color = '#ff9800';
            if (info.state === 'disconnected') statusDiv.style.color = '#f44336';
        });

        async function connecterIntercom() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = '#ff9800';
            statusDiv.innerText = "Négociation d'accès...";

            // STRUCTURE PRO & SÉCURISÉE : 
            // L'URL de production officielle de ton LiveKit et l'appel de génération automatique
            const wsUrl = "wss://rydercom-4w764w6b.livekit.cloud";
            const roomName = "Meute-Labo-Routier";
            const participantName = "Moto-Test-Franck";

            try {
                // Routage vers ton service d'authentification sécurisé existant
                const response = await fetch(`https://rydercom.puter.site/token?room=${roomName}&identity=${participantName}`);
                if (!response.ok) throw new Error("Échec de sécurisation du Token");
                
                const data = await response.json();
                
                statusDiv.innerText = "Lancement du moteur natif...";

                // Transfert des jetons à la couche OS via le plugin Capacitor
                await RyderComNativeAudio.joinNativeRoom({
                    wsUrl: wsUrl,
                    token: data.token,
                    sessionName: "Intercom Motard — Canal Sécurisé"
                });

            } catch (err) {
                statusDiv.style.color = '#f44336';
                statusDiv.innerText = "Erreur : " + err.message;
                alert("Erreur critique d'architecture : " + err.message);
            }
        }

        function deconnecterIntercom() {
            RyderComNativeAudio.leaveNativeRoom().catch(err => {
                alert("Erreur de coupure : " + err);
            });
        }
    </script>
</body>
</html>
