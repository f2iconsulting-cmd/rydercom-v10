<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyderCom Lab - Engine 8_8_3</title>
    <style>
        body { font-family: monospace; padding: 15px; background: #121212; color: #aaa; text-align: center; }
        h1 { color: #ff9800; font-size: 22px; margin: 5px 0; }
        p { color: #888; font-size: 13px; margin: 0 0 5px 0; }
        .version { color: #444; font-size: 11px; margin-bottom: 15px; }
        .metadata-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px; margin: 10px 0; text-align: left; font-size: 12px; }
        .metadata-line { margin: 4px 0; display: flex; justify-content: space-between; }
        .metadata-val { color: #00e5ff; font-weight: bold; }
        button { width: 100%; padding: 18px; margin: 8px 0; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; display: block; }
        .start { background: #2e7d32; color: white; }
        .share { background: #0288d1; color: white; }
        .stop  { background: #c62828; color: white; }
        .copy  { background: #37474f; color: #fff; padding: 10px; font-size: 14px; }
        #status { font-size: 18px; font-weight: bold; color: #2196F3; margin: 15px; padding: 10px; border: 1px solid #333; background: #222; border-radius: 8px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-family: monospace; font-size: 11px; box-sizing: border-box; margin-top: 6px; }
        #console { text-align: left; background: #000; border: 1px solid #333; padding: 10px; border-radius: 6px; height: 200px; overflow-y: auto; font-size: 12px; color: #00ff00; margin-top: 15px; }
    </style>
    <script src="capacitor.js"></script>
</head>
<body>

    <h1>🏍️ RyderCom — ENGINE 8_8_3</h1>
    <p>Labo : Moteur LiveKit Natif + Partage Extérieur</p>
    <div class="version">v1.5.0-labo-build20</div>

    <div id="status">Statut : DÉCONNECTÉ</div>

    <div class="metadata-box">
        <div class="metadata-line"><span>Room ID active :</span><span id="meta-room" class="metadata-val">-</span></div>
        <div class="metadata-line"><span>User Identity :</span><span id="meta-user" class="metadata-val">-</span></div>
        <div class="metadata-line"><span>Session ID serveur :</span><span id="meta-sid" class="metadata-val">-</span></div>
    </div>

    <div class="metadata-box" style="border-color: #0288d1;">
        <p style="margin-bottom: 6px; color: #0288d1; font-weight: bold;">🔗 Rejoindre une session PC :</p>
        <input type="text" id="input-lien-pc" placeholder="Colle l URL du PC ici...">
        <button onclick="connecterDepuisLienPC()" style="background: #0288d1; color: white; padding: 12px; margin-top: 8px; font-size: 14px; border-radius: 8px; border: none; width: 100%; font-weight: bold; cursor: pointer;">REJOINDRE SESSION PC</button>
    </div>

    <button class="start" onclick="connecterIntercom()">1. REJOINDRE L'INTERCOM</button>
    <button class="share" onclick="partagerSession()">📋 PARTAGER LE LIEN DE LA ROOM</button>
    <button class="stop"  onclick="deconnecterIntercom()">2. QUITTER L'INTERCOM</button>
    <button class="copy"  onclick="copierLogs()">📋 Copier les logs</button>

    <div id="console">--- Console Prête v1.3.0 (Moteur LiveKit Natif) ---</div>

    <script>
        const { RyderComNativeAudio } = Capacitor.Plugins;

        const WS_URL      = "wss://testwave-zq4b8zeh.livekit.cloud";
        const PUTER_TOKEN = "https://helpful-flower-4129.puter.work/api/get-token";

        let logHistory  = [];
        let currentRoom = "";
        let currentToken = "";

        function log(msg) {
            const d = new Date();
            const t = d.getHours()+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0");
            const ligne = "["+t+"] "+msg;
            logHistory.push(ligne);
            const c = document.getElementById("console");
            c.innerHTML += "<br>" + ligne;
            c.scrollTop = c.scrollHeight;
            console.log("[LABO] " + msg);
        }

        function setStatus(text, color) {
            const s = document.getElementById("status");
            s.innerText = "Statut : " + text;
            s.style.color = color;
        }

        function copierLogs() {
            navigator.clipboard.writeText(logHistory.join("\n"))
                .then(() => alert("Logs copiés !"))
                .catch(err => alert("Erreur copie : " + err));
        }

        try {
            if (RyderComNativeAudio) {
                RyderComNativeAudio.addListener("connectionStateChange", (info) => {
                    const state = info.state || "INCONNU";

                    if (state === "CONNECTED") {
                        setStatus("CONNECTÉ ✅", "#4CAF50");
                        log("CONNECTÉ au serveur LiveKit ✅");
                    } else if (state === "CONNECTING") {
                        setStatus("CONNEXION...", "#ff9800");
                        log("Connexion en cours...");
                    } else if (state === "RECONNECTING") {
                        setStatus("RECONNEXION... 🔄", "#ff9800");
                        log("⚠️ Reconnexion en cours (zone blanche ?)");
                    } else if (state === "DISCONNECTED") {
                        setStatus("DÉCONNECTÉ ❌", "#f44336");
                        log("DÉCONNECTÉ du serveur LiveKit");
                    } else if (state === "MICRO_ACTIVE") {
                        log("🎤 Micro actif — voyant vert Android allumé");
                    } else if (state === "MICRO_ERROR") {
                        log("⚠️ Erreur activation microphone");
                    } else if (state.startsWith("ROOM_ID:")) {
                        const rid = state.replace("ROOM_ID:", "");
                        document.getElementById("meta-room").innerText = rid;
                        log("Room LiveKit confirmée serveur : " + rid);
                    } else if (state.startsWith("SESSION_ID:")) {
                        const sid = state.replace("SESSION_ID:", "");
                        document.getElementById("meta-sid").innerText = sid;
                        log("Session ID serveur : " + sid);
                    } else if (state.startsWith("ERROR:")) {
                        setStatus("ERREUR ❌", "#ff0000");
                        log("ERREUR SERVEUR : " + state.replace("ERROR:", ""));
                    } else if (state === "ERROR") {
                        setStatus("ERREUR ❌", "#ff0000");
                        log("ERREUR connexion serveur");
                    } else {
                        log("MOTEUR NATIF → " + state);
                    }
                });
                log("Plugin RyderComNativeAudio branché ✅");
            } else {
                log("⚠️ Plugin RyderComNativeAudio NON DÉTECTÉ");
            }
        } catch(e) {
            log("Crash écouteurs : " + e.message);
        }

        async function connecterIntercom() {
            log("--- CONNEXION DÉMARRÉE ---");
            try {
                await RyderComNativeAudio.checkAndRequestPermissions();
                log("Permissions validées ✅");
            } catch(e) {
                log("⚠️ Permissions refusées : " + e.message);
                return;
            }
            setStatus("Génération room...", "#ff9800");

            if (!RyderComNativeAudio) {
                log("ERREUR : Plugin natif manquant");
                return;
            }

            currentRoom = "room_" + Math.random().toString(36).substring(7) + "_" + Date.now();
            const identity = "Moto-Franck-" + Math.random().toString(36).substring(5);

            document.getElementById("meta-room").innerText = currentRoom;
            document.getElementById("meta-user").innerText = identity;
            document.getElementById("meta-sid").innerText = "-";

            log("Room générée : " + currentRoom);
            log("Identity : " + identity);

            try {
                setStatus("Négociation token...", "#ff9800");
                log("Appel Puter → " + PUTER_TOKEN);

                const response = await fetch(PUTER_TOKEN, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        roomName: currentRoom,
                        participantIdentity: identity
                    })
                });

                if (!response.ok) {
                    const txt = await response.text();
                    throw new Error("Puter HTTP " + response.status + " : " + txt);
                }

                const data = await response.json();
                if (!data.token) throw new Error("Token absent dans la réponse Puter");

                currentToken = data.token;
                log("Token reçu ✅ (" + currentToken.length + " chars)");

                setStatus("Lancement moteur natif...", "#ff9800");
                log("joinNativeRoom → " + WS_URL);

                await RyderComNativeAudio.joinNativeRoom({
                    wsUrl: WS_URL,
                    token: currentToken,
                    sessionName: currentRoom
                });

                log("joinNativeRoom transmis ✅");

            } catch (err) {
                setStatus("ERREUR ❌", "#ff0000");
                log("ERREUR : " + err.message);
            }
        }

        async function partagerSession() {
            if (!currentRoom) {
                alert("Lance d abord la connexion.");
                return;
            }
            const url = "https://elegant-moon-856.puter.work?room=" + currentRoom;
            log("Lien de partage : " + url);
            if (navigator.share) {
                try {
                    await navigator.share({ title: "Rejoindre mon Intercom RyderCom", text: "Canal audio : " + currentRoom, url: url });
                    log("Partage OS ouvert ✅");
                } catch (err) {
                    log("Partage annulé : " + err.message);
                }
            } else {
                navigator.clipboard.writeText(url);
                alert("Lien copié :\n" + url);
                log("Lien copié localement.");
            }
        }

        async function connecterDepuisLienPC() {
            const rawUrl = document.getElementById("input-lien-pc").value.trim();
            if (!rawUrl) { alert("Colle d abord l URL du PC."); return; }
            log("--- CONNEXION DEPUIS LIEN PC ---");
            setStatus("Analyse URL...", "#ff9800");
            try {
                const urlMatch = rawUrl.match(/https?:\/\/[^\s]+/);
                if (!urlMatch) throw new Error("URL HTTP invalide");
                const cleanUrl = urlMatch[0];
                log("URL extraite : " + cleanUrl);
                const urlObj = new URL(cleanUrl);
                const sid = urlObj.searchParams.get("sid");
                if (!sid) throw new Error("Parametre sid manquant dans l URL");
                currentRoom = sid;
                const identity = "Moto-Franck-Labo-" + Math.floor(Math.random() * 1000);
                document.getElementById("meta-room").innerText = currentRoom;
                document.getElementById("meta-user").innerText = identity;
                log("Room cible : " + currentRoom);
                log("Identity : " + identity);
                setStatus("Negociation token...", "#ff9800");
                log("Appel Puter -> " + PUTER_TOKEN);
                const response = await fetch(PUTER_TOKEN, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ roomName: currentRoom, participantIdentity: identity })
                });
                if (!response.ok) { const txt = await response.text(); throw new Error("Puter HTTP " + response.status + " : " + txt); }
                const data = await response.json();
                if (!data.token) throw new Error("Token absent");
                currentToken = data.token;
                log("Token recu ✅ (" + currentToken.length + " chars)");
                setStatus("Lancement moteur natif...", "#ff9800");
                await RyderComNativeAudio.joinNativeRoom({ wsUrl: WS_URL, token: currentToken, sessionName: currentRoom });
                log("joinNativeRoom transmis ✅");
            } catch(err) {
                setStatus("ERREUR ❌", "#ff0000");
                log("ERREUR : " + err.message);
            }
        }

        function deconnecterIntercom() {
            log("--- DÉCONNEXION ---");
            if (RyderComNativeAudio) {
                RyderComNativeAudio.leaveNativeRoom()
                    .then(() => {
                        log("Fermeture session natif ✅");
                        document.getElementById("meta-room").innerText = "-";
                        document.getElementById("meta-user").innerText = "-";
                        document.getElementById("meta-sid").innerText = "-";
                        currentRoom = "";
                        currentToken = "";
                    })
                    .catch(err => log("Erreur fermeture : " + err.message));
            }
        }
    </script>
</body>
</html>
